<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Market Pulse AI</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b1220;
  color:#e2e8f0;
  text-align:center;
}

.container {
  padding:60px 20px;
}

textarea {
  width:80%;
  max-width:600px;
  height:120px;
  margin:20px 0;
  border-radius:10px;
  border:none;
  padding:10px;
}

button {
  padding:14px 30px;
  font-size:16px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.card {
  margin-top:40px;
  padding:25px;
  background:#111827;
  border-radius:16px;
  display:inline-block;
  text-align:left;
  min-width:300px;
}

.label { color:#64748b; font-size:14px; }
.value { font-size:18px; margin-bottom:10px; }

.risk-low { color:#22c55e; }
.risk-medium { color:#facc15; }
.risk-high { color:#ef4444; }

/* News list */
#news-container {
  margin-top: 40px;
  text-align: left;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

.news-card {
  background: #111827;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
  border-left: 4px solid #334155;
}

.news-card.impact-bullish { border-left-color: #22c55e; }
.news-card.impact-bearish { border-left-color: #ef4444; }
.news-card.impact-neutral { border-left-color: #64748b; }

.news-card .news-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #f1f5f9;
}

.news-card .news-meta {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 10px;
}

.news-card .news-meta span {
  margin-right: 16px;
}

.news-card .news-summary {
  font-size: 14px;
  line-height: 1.5;
  color: #94a3b8;
}

/* Analysis result */
#analysis-result {
  margin-top: 24px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.analysis-card {
  background: #111827;
  border-radius: 12px;
  padding: 24px;
  text-align: left;
}

.analysis-card .analysis-direction {
  font-size: 15px;
  color: #64748b;
  margin-bottom: 6px;
}

.analysis-card .analysis-direction-value {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}

.analysis-card .analysis-direction-value.bullish { color: #22c55e; }
.analysis-card .analysis-direction-value.bearish { color: #ef4444; }
.analysis-card .analysis-direction-value.neutral { color: #94a3b8; }

.analysis-card .analysis-row {
  margin-bottom: 14px;
}

.analysis-card .analysis-row:last-child {
  margin-bottom: 0;
}

.analysis-prompt {
  color: #64748b;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="container">

<h1>Market Pulse AI</h1>
<p>貼上新聞，AI 自動分析市場方向</p>

<div id="news-container"></div>

<textarea id="news-input" placeholder="貼上市場新聞..."></textarea><br>

<button id="analyze-btn" onclick="analyze()">Analyze Market</button>

<div id="analysis-result"></div>

</div>

<script>
(function loadNews() {
  fetch('data/news.json')
    .then(function(res) { return res.json(); })
    .then(function(items) {
      var container = document.getElementById('news-container');
      if (!container) return;
      container.innerHTML = items.map(function(item) {
        var impactClass = 'impact-neutral';
        if (item.impact && item.impact.toLowerCase() === 'bullish') impactClass = 'impact-bullish';
        if (item.impact && item.impact.toLowerCase() === 'bearish') impactClass = 'impact-bearish';
        return '<div class="news-card ' + impactClass + '">' +
          '<div class="news-title">' + (item.title || '') + '</div>' +
          '<div class="news-meta">' +
            '<span>' + (item.time || '') + '</span>' +
            '<span>' + (item.source || '') + '</span>' +
            '<span>' + (item.impact || '') + '</span>' +
          '</div>' +
          '<div class="news-summary">' + (item.summary || '') + '</div>' +
          '</div>';
      }).join('');
    })
    .catch(function() {
      var c = document.getElementById('news-container');
      if (c) c.innerHTML = '<p style="color:#64748b">無法載入新聞資料</p>';
    });
})();

function analyzeLine(text) {
  var t = (text || "").toLowerCase();
  if (t.indexOf("rate cut") !== -1 || t.indexOf("stimulus") !== -1 || t.indexOf("growth") !== -1) {
    return 1;
  }
  if (t.indexOf("inflation") !== -1 || t.indexOf("war") !== -1 || t.indexOf("crisis") !== -1) {
    return -1;
  }
  return 0;
}

function analyze() {
  var textarea = document.getElementById("news-input");
  var resultEl = document.getElementById("analysis-result");
  if (!textarea || !resultEl) return;

  var raw = (textarea.value || "").trim();
  if (!raw) {
    resultEl.innerHTML = '<p class="analysis-prompt">請先貼上新聞內容再進行分析。</p>';
    return;
  }

  var lines = raw.split(/\n/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
  if (lines.length === 0) {
    resultEl.innerHTML = '<p class="analysis-prompt">請先貼上新聞內容再進行分析。</p>';
    return;
  }

  var numBullish = 0, numBearish = 0, numNeutral = 0;
  var total = 0;
  for (var i = 0; i < lines.length; i++) {
    var score = analyzeLine(lines[i]);
    total += score;
    if (score === 1) numBullish++;
    else if (score === -1) numBearish++;
    else numNeutral++;
  }

  var direction, directionClass, strategy;
  if (total >= 1) {
    direction = "Bullish";
    directionClass = "bullish";
    strategy = "Buy / Long";
  } else if (total <= -1) {
    direction = "Bearish";
    directionClass = "bearish";
    strategy = "Sell / Short";
  } else {
    direction = "Sideways";
    directionClass = "neutral";
    strategy = "Wait / Observe";
  }

  var risk, riskClass;
  if (numBullish >= 2 && numBearish >= 2) {
    risk = "High";
    riskClass = "risk-high";
  } else if (numNeutral >= lines.length / 2) {
    risk = "Low";
    riskClass = "risk-low";
  } else {
    risk = "Medium";
    riskClass = "risk-medium";
  }

  var maxSame = Math.max(numBullish, numBearish, numNeutral);
  var consistency = maxSame / lines.length;
  var confidence;
  if (numBullish > 0 && numBearish > 0) {
    confidence = 50 + Math.min(10, lines.length);
  } else if (consistency >= 2 / 3) {
    confidence = 70 + Math.min(10, Math.floor(lines.length * 2));
  } else {
    confidence = 55 + Math.min(10, lines.length);
  }
  confidence = Math.min(100, Math.max(0, confidence));

  resultEl.innerHTML =
    '<div class="analysis-card">' +
      '<div class="analysis-row">' +
        '<div class="analysis-direction">Direction</div>' +
        '<div class="analysis-direction-value ' + directionClass + '">' + direction + '</div>' +
      '</div>' +
      '<div class="analysis-row">' +
        '<div class="label">Strategy</div>' +
        '<div class="value">' + strategy + '</div>' +
      '</div>' +
      '<div class="analysis-row">' +
        '<div class="label">Risk</div>' +
        '<div class="value ' + riskClass + '">' + risk + '</div>' +
      '</div>' +
      '<div class="analysis-row">' +
        '<div class="label">Confidence</div>' +
        '<div class="value">' + confidence + '%</div>' +
      '</div>' +
    '</div>';
}
</script>

</body>
</html>
