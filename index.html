<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Market Pulse AI</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0b1220;
  color:#e2e8f0;
  text-align:center;
}

.container {
  padding:60px 20px;
}

textarea {
  width:80%;
  max-width:600px;
  height:120px;
  margin:20px 0;
  border-radius:10px;
  border:none;
  padding:10px;
}

button {
  padding:14px 30px;
  font-size:16px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.card {
  margin-top:40px;
  padding:25px;
  background:#111827;
  border-radius:16px;
  display:inline-block;
  text-align:left;
  min-width:300px;
}

.label { color:#64748b; font-size:14px; }
.value { font-size:18px; margin-bottom:10px; }

.risk-low { color:#22c55e; }
.risk-medium { color:#facc15; }
.risk-high { color:#ef4444; }
</style>

</head>
<body>

<div class="container">

<h1>Market Pulse AI</h1>
<p>貼上新聞，AI 自動分析市場方向</p>

<textarea id="news" placeholder="貼上市場新聞..."></textarea><br>

<button onclick="analyze()">Analyze Market</button>

<div id="result"></div>

</div>

<script>
function analyze() {

  const text = document.getElementById("news").value.toLowerCase();

  let direction = "震盪";
  let strategy = "觀望";
  let risk = "medium";
  let confidence = 60;

  if(text.includes("rate hike") || text.includes("inflation")){
    direction = "偏空";
    strategy = "降低倉位";
    risk = "high";
    confidence = 70;
  }

  if(text.includes("liquidity") || text.includes("stimulus") || text.includes("rally")){
    direction = "偏多";
    strategy = "順勢操作";
    risk = "low";
    confidence = 80;
  }

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="label">Direction</div>
      <div class="value">📈 ${direction}</div>

      <div class="label">Strategy</div>
      <div class="value">🧠 ${strategy}</div>

      <div class="label">Risk</div>
      <div class="value risk-${risk}">
        ⚠️ ${risk.toUpperCase()}
      </div>

      <div class="label">Confidence</div>
      <div class="value">📊 ${confidence}</div>
    </div>
  `;
}
</script>

</body>
</html>
